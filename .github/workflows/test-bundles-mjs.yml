name: test-bundles-mjs

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
      - name: install
        run: npm install
      - name: test-bundles-mjs
        run: node --test src/getUserAgent.bundle.spec.mjs
      - name: install typescript
        run: npm install --save-dev typescript --prefix ./src/__fixtures__/build
      - name: test-bundles-mjs
        run: node --test src/getUserAgent.bundle.spec.mjs

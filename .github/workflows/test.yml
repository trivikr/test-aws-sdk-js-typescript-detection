name: test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
      - name: install
        run: npm install
      - name: test-cjs
        run: node --test src/getUserAgent.spec.cjs
      - name: test-mjs
        run: node --test src/getUserAgent.spec.cjs

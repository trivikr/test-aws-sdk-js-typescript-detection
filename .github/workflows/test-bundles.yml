name: test-bundles

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
      - name: install
        run: npm install
      - name: test-bundles-cjs
        run: node --test src/getUserAgent.bundle.spec.cjs
      - name: test-bundles-mjs
        run: node --test src/getUserAgent.bundle.spec.mjs

  test-typescript-dirname:
    runs-on: ubuntu-latest
    env:
      TSC_VERSION: "5.9.0-dev.20250731"
      TSC_VERSION_UNSEEN: "5.9.3"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
      - name: install
        run: |
          npm install
          npm install -D -E typescript@$TSC_VERSION --prefix ./src/__fixtures__/build
          npm install -D -E typescript@$TSC_VERSION_UNSEEN
      - name: test-bundles-cjs
        run: node --test src/getUserAgent.bundle.spec.cjs
      - name: test-bundles-mjs
        run: node --test src/getUserAgent.bundle.spec.mjs

  test-typescript-process-cwd:
    runs-on: ubuntu-latest
    env:
      TSC_VERSION: "5.9.0-dev.20250731"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
      - name: install
        run: |
          npm install
          npm install -D -E typescript@$TSC_VERSION
      - name: test-bundles-cjs
        run: node --test src/getUserAgent.bundle.spec.cjs
      - name: test-bundles-mjs
        run: node --test src/getUserAgent.bundle.spec.mjs

  test-typescript-detection-disabled:
    runs-on: ubuntu-latest
    env:
      TSC_VERSION: "5.9.0-dev.20250731"
      TSC_VERSION_UNSEEN: "5.9.3"
      AWS_SDK_JS_TYPESCRIPT_DETECTION_DISABLED: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
      - name: install
        run: |
          npm install
          npm install -D -E typescript@$TSC_VERSION --prefix ./src/__fixtures__/build
          npm install -D -E typescript@$TSC_VERSION_UNSEEN
      - name: test-bundles-cjs
        run: node --test src/getUserAgent.bundle.spec.cjs
      - name: test-bundles-mjs
        run: node --test src/getUserAgent.bundle.spec.mjs

  test-typescript-missing-dev-deps-in-package-json:
    runs-on: ubuntu-latest
    env:
      TSC_VERSION_UNSEEN: "5.9.3"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
      - name: install
        run: |
          npm install
          npm install -D -E typescript@5.9.3 --prefix src/__fixtures__/build
          jq 'del(.devDependencies.typescript)' src/__fixtures__/build/package.json > tmp.json && mv tmp.json src/__fixtures__/build/package.json
          npm install -D -E typescript@$TSC_VERSION_UNSEEN
      - name: test-bundles-cjs
        run: node --test src/getUserAgent.bundle.spec.cjs
      - name: test-bundles-mjs
        run: node --test src/getUserAgent.bundle.spec.mjs

name: test-mjs

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  TS_VERSION: "5.9.3"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
      - name: install
        run: npm install
          npm install -D -E typescript@$TS_VERSION
      - name: test-cjs
        run: node --test src/getUserAgent.spec.cjs
      - name: test-mjs
        run: node --test src/getUserAgent.spec.mjs

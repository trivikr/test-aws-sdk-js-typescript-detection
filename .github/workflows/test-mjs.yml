name: test-mjs

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
      - name: install
        run: npm install
      - name: test-mjs
        run: node --test src/getUserAgent.spec.mjs
      - name: install typescript
        run: npm install --save-dev typescript
      - name: test-mjs
        run: node --test src/getUserAgent.spec.mjs
